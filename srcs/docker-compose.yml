version: '3.8'

services:
  mariadb:
    build: ./requirements/mariadb
    container_name: mariadb
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - inception
    ports:
      - "3306:3306"

# Adicione outros serviços (nginx, wordpress, etc) conforme necessário

volumes:
  mariadb_data:
    driver: local

networks:
  inception:
    driver: bridge
